<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Douglas Barbosa — Software Engineer</title>
  <meta name="description" content="Full Stack Software Engineer. .NET, APIs & Scalable Systems. Based in Dublin, Ireland." />
  <link rel="stylesheet" href="assets/main.css" />
  <style>
    .db-hero { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 64px 24px 48px; }
    .db-tag  { font-family: var(--font-mono); font-size: 11px; color: var(--blue); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
    .db-title {
      font-family: var(--font-display);
      font-size: 40px; font-weight: 500; color: var(--navy);
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 16px;
    }
    .db-title em { font-style: normal; color: var(--blue); }
    .db-subtitle { font-family: var(--font-body); font-size: 15px; color: var(--gray500); line-height: 1.7; max-width: 300px; margin-bottom: 48px; }
    .db-subtitle em { font-style: normal; color: var(--navy); font-weight: 500; }
    .db-links { display: flex; flex-direction: column; border-top: 1px solid var(--gray200); }
    .db-link-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 1px solid var(--gray200);
      text-decoration: none; transition: all 0.15s;
    }
    .db-link-item:hover .db-link-phrase { color: var(--navy); }
    .db-link-item:hover .db-link-arrow  { color: var(--blue); transform: translate(3px, -3px); }
    .db-link-left { display: flex; align-items: baseline; gap: 14px; }
    .db-link-num  { font-family: var(--font-mono); font-size: 10px; color: var(--gray300); min-width: 20px; }
    .db-link-phrase { font-family: var(--font-display); font-size: 18px; font-weight: 500; color: var(--gray400); transition: color 0.2s; }
    .db-link-arrow  { font-size: 16px; color: var(--gray300); transition: color 0.2s, transform 0.2s; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="page-wrap">

    <p class="db-subtitle">
      <span data-i18n="home.subtitle1">Software is just the medium.</span><br>
      <em data-i18n="home.subtitle2">What I'm really building is outcomes.</em>
    </p>

    <div class="db-links">
      <a href="skills.html" class="db-link-item">
        <div class="db-link-left">
          <span class="db-link-num">01</span>

        </div>
        <span class="db-link-arrow">↗</span>
      </a>
      <a href="services.html" class="db-link-item">

        </div>
        <span class="db-link-arrow">↗</span>
      </a>
      <a href="portfolio.html" class="db-link-item">
        <div class="db-link-left">
          <span class="db-link-num">03</span>
          <span class="db-link-phrase" data-i18n="home.links.2.label">What I did.</span>
        </div>
        <span class="db-link-arrow">↗</span>
      </a>
      <a href="posts.html" class="db-link-item">
        <div class="db-link-left">
          <span class="db-link-num">04</span>

        </div>

  </div>

  <footer class="db-footer">

  </footer>

</div>
<script src="assets/i18n.js"></script>

</html>
